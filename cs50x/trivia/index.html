<!DOCTYPE html>

<html lang="en">

    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>

            document.addEventListener('DOMContentLoaded', function() {
                let right = document.querySelector('.correct');
                right.addEventListener('click', function() {
                    right.style.backgroundColor = 'green';
                    document.querySelector('#feedback').innerHTML = 'Correct!';
                });
                let wrongs = document.querySelectorAll('.wrong');
                for (let i = 0; i < wrongs.length; i++) {
                    wrongs[i].addEventListener('click', function() {
                        wrongs[i].style.backgroundColor = 'red';
                        document.querySelector('#feedback').innerHTML = 'Incorrect!';
                    });
                }
                let input = document.querySelector('input');
                document.querySelector('#check').addEventListener('click', function() {

                    if (input.value.toLowerCase() == 'blue') {
                        input.style.backgroundColor = 'green';
                        document.querySelector('#feedback2').innerHTML = 'Correct!';
                    } else {
                        input.style.backgroundColor = 'red';
                        document.querySelector('#feedback2').innerHTML = 'Incorrect!';
                    }
                });
            });
        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <h3>What... is the air-speed velocity of an unladen swallow?</h3>
                <button class="correct" style='margin-right:50px'>African or European?</button>
                <button class="wrong" style='margin-right:50px'>90 mph</button>
                <button class="wrong">100 m/s</button>
                <p id="feedback"></p>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <h3>What is your favorite color?</h3>
                <input type="text">
                <button type="check" id="check">Check Answer</button>
                <p id="feedback2"></p> </div>
            </div>
        </div>
    </body>
</html>
